spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        auto_quote_keyword: true
        format_sql: true
  sql:
    init:
      mode: always
      platform: h2
  security:
    oauth2:
      resourceserver:
        jwt:
          authority-prefix: ""
