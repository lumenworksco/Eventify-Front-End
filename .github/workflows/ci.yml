name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Eventify-Back-End

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build & Test
        run: ./mvnw clean verify

  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Eventify-Front-End

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Eventify-Front-End/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
