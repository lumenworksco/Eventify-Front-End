services:
  # Spring Boot Backend API
  - type: web
    name: eventify-backend
    runtime: docker
    dockerfilePath: ./Eventify-Back-End/Dockerfile
    dockerContext: ./Eventify-Back-End
    plan: free
    region: frankfurt
    autoDeploy: true
    envVars:
      - key: PGHOST
        sync: false
      - key: PGPORT
        value: "5432"
      - key: PGDATABASE
        value: postgres
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"

  # Next.js Frontend
  - type: web
    name: eventify-frontend
    runtime: docker
    dockerfilePath: ./Eventify-Front-End/Dockerfile
    dockerContext: ./Eventify-Front-End
    plan: free
    region: frankfurt
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: "3000"
